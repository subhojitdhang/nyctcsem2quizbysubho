<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEM-2 EXAM PORTAL</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; --text: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 1200px; margin: 0 auto; min-height: 100vh; background: var(--panel); display: flex; flex-direction: column; position: relative; }
        
        @media (min-width: 851px) {
            .app-container { flex-direction: row; height: 100vh; overflow: hidden; }
            .sidebar { width: 300px; border-right: 1px solid #334155; height: 100%; }
            .main-content { flex: 1; height: 100%; overflow-y: auto; }
        }

        .screen { width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        .hidden { display: none !important; }

        .sidebar { background: rgba(0,0,0,0.3); padding: 20px; display: flex; flex-direction: column; }
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 15px 0; max-height: 300px; overflow-y: auto; padding: 5px; }
        @media (max-width: 850px) { .nav-grid { grid-template-columns: repeat(10, 1fr); } }

        .nav-item { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; cursor: pointer; background: var(--danger); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .nav-item.answered { background: var(--success); }
        .nav-item.current { outline: 3px solid var(--accent); transform: scale(1.1); z-index: 2; }

        .main-content { padding: 25px; display: flex; flex-direction: column; }
        .option-box { background: rgba(255,255,255,0.05); padding: 16px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .option-box.selected { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }

        .btn { padding: 14px 28px; border-radius: 8px; border: none; font-weight: bold; background: var(--accent); color: #0f172a; cursor: pointer; font-size: 14px; }
        .btn-red { background: var(--danger); color: white; }
        .btn-gray { background: #475569; color: white; }
        
        input { padding: 14px; width: 100%; max-width: 350px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #020617; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 13px; }
        .copyright { padding: 20px; text-align: center; font-size: 10px; color: #64748b; letter-spacing: 1px; width: 100%; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-gate" class="screen">
        <h1 style="color:var(--accent); text-align:center;">SEM-2 EXAM PORTAL</h1>
        <input type="password" id="gate-pass" placeholder="System Password">
        <button class="btn" onclick="systemLogin()">Enter Portal</button>
        <div class="copyright">© SUBHO</div>
    </div>

    <div id="scr-reg" class="screen hidden">
        <h2>Student Registration</h2>
        <input type="text" id="stu-name" placeholder="Full Name">
        <input type="text" id="stu-roll" placeholder="Roll Number">
        <button class="btn" style="width:100%; max-width:350px;" onclick="startExam()">Start Exam</button>
        <button class="btn btn-gray" style="width:100%; max-width:350px; margin-top:10px;" onclick="openAdmin()">Admin Dashboard</button>
        <div class="copyright">© SUBHO</div>
    </div>

    <div id="scr-exam" class="hidden" style="display:contents;">
        <div class="sidebar">
            <div id="timer" style="font-size:32px; text-align:center; color:var(--danger); font-weight:bold; margin-bottom:10px;">20:00</div>
            <div class="nav-grid" id="nav-grid"></div>
            <button class="btn btn-red" style="margin-top:auto;" onclick="forceSubmit()">Finish & Submit</button>
        </div>
        <div class="main-content">
            <div id="disp-info" style="font-size:13px; font-weight:bold; color:var(--accent); margin-bottom:15px; background:rgba(0,0,0,0.2); padding:10px; border-radius:5px;"></div>
            <div id="q-container">
                <h3 id="q-text" style="min-height:60px; line-height:1.4;"></h3>
                <div id="options-list"></div>
            </div>
            <div style="display:flex; gap:15px; margin-top:30px; justify-content:center; padding-bottom:60px;">
                <button class="btn btn-gray" onclick="navQ(-1)">PREVIOUS</button>
                <button class="btn" onclick="navQ(1)">NEXT QUESTION</button>
            </div>
            <div class="copyright">© SUBHO</div>
        </div>
    </div>

    <div id="scr-result" class="screen hidden">
        <div style="background:rgba(255,255,255,0.05); padding:40px; border-radius:20px; border:2px solid var(--accent); text-align:center; width:90%; max-width:450px;">
            <h1 id="res-status" style="margin-top:0; font-size:40px;"></h1>
            <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
            <div style="text-align:left; font-size:18px; line-height:2;">
                <p><b>Name:</b> <span id="res-name"></span></p>
                <p><b>Roll No:</b> <span id="res-roll"></span></p>
                <p><b>Total Score:</b> <span id="res-score" style="color:var(--accent)"></span> / 100</p>
            </div>
            <button class="btn" style="margin-top:30px; width:100%;" onclick="location.reload()">Return to Home</button>
        </div>
        <div class="copyright">© SUBHO</div>
    </div>

    <div id="scr-admin" class="screen hidden" style="justify-content: flex-start; padding-top:40px;">
        <h2 style="color:var(--accent)">Admin Data Records</h2>
        <div style="width:100%; overflow-x:auto; border-radius:10px; border:1px solid #334155; background:#020617;">
            <table>
                <thead style="background:#1e293b;"><tr><th>Name</th><th>Roll</th><th>Score</th><th>Status</th></tr></thead>
                <tbody id="log-body"></tbody>
            </table>
        </div>
        <div style="margin-top:25px; width:100%; max-width:400px; background:rgba(255,255,255,0.03); padding:20px; border-radius:12px;">
            <p style="margin:0 0 10px 0; font-size:14px; color:var(--accent)">System Password Management:</p>
            <input type="text" id="new-sys-pass" placeholder="Enter New Password">
            <button class="btn" style="width:100%" onclick="updatePassword()">Update Password</button>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:15px; margin-top:30px; justify-content:center;">
            <button class="btn btn-gray" onclick="location.reload()">Back to Login</button>
            <button class="btn btn-red" onclick="clearData()">Clear All Student Logs</button>
        </div>
        <div class="copyright">© SUBHO</div>
    </div>
</div>

// --- CORE LOGIC ---
let examSet = [], currentIdx = 0, answers = {}, timer;
let sysPass = localStorage.getItem('sysPass') || 'admin123';

function systemLogin() {
    const val = document.getElementById('gate-pass').value;
    if(val === sysPass) {
        document.getElementById('scr-gate').classList.add('hidden');
        document.getElementById('scr-reg').classList.remove('hidden');
    } else alert("Access Denied: Incorrect Password");
}

function openAdmin() {
    const code = prompt("Enter Admin Master Code:");
    if(MASTER_CODES.includes(code)) {
        renderLogs();
        document.getElementById('scr-reg').classList.add('hidden');
        document.getElementById('scr-admin').classList.remove('hidden');
    }
}

function startExam() {
    const name = document.getElementById('stu-name').value.trim();
    const roll = document.getElementById('stu-roll').value.trim();
    if(!name || !roll) return alert("Please enter Name and Roll Number");

    document.getElementById('disp-info').innerText = `STU: ${name.toUpperCase()} | ROLL: ${roll}`;
    
    // Shuffle and pick 50
    examSet = [...DB].sort(() => 0.5 - Math.random()).slice(0, 50);
    answers = {}; currentIdx = 0;

    const grid = document.getElementById('nav-grid');
    grid.innerHTML = '';
    for(let i=0; i<examSet.length; i++) {
        let div = document.createElement('div');
        div.className = 'nav-item'; div.id = `nav-${i}`; div.innerText = i+1;
        div.onclick = () => { currentIdx = i; loadQ(); };
        grid.appendChild(div);
    }

    document.getElementById('scr-reg').classList.add('hidden');
    document.getElementById('scr-exam').classList.remove('hidden');
    loadQ();
    runTimer(1200);
}

function loadQ() {
    const q = examSet[currentIdx];
    document.getElementById('q-text').innerText = `${currentIdx + 1}. ${q.q}`;
    
    // Update nav grid
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('current'));
    document.getElementById(`nav-${currentIdx}`).classList.add('current');

    // Load options
    const list = document.getElementById('options-list');
    list.innerHTML = '';
    q.a.forEach((opt, idx) => {
        let div = document.createElement('div');
        div.className = `option-box ${answers[currentIdx] === idx ? 'selected' : ''}`;
        div.innerText = `${String.fromCharCode(97+idx)}) ${opt}`;
        div.onclick = () => {
            answers[currentIdx] = idx;
            document.getElementById(`nav-${currentIdx}`).classList.add('answered');
            loadQ();
            if(currentIdx < examSet.length - 1) setTimeout(() => navQ(1), 200);
        };
        list.appendChild(div);
    });
}

function navQ(dir) {
    let target = currentIdx + dir;
    if(target >= 0 && target < examSet.length) {
        currentIdx = target;
        loadQ();
    }
}

function runTimer(sec) {
    if(timer) clearInterval(timer);
    timer = setInterval(() => {
        let m = Math.floor(sec/60);
        let s = sec%60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if(sec-- <= 0) { clearInterval(timer); forceSubmit(); }
    }, 1000);
}

function forceSubmit() {
    if(!confirm("Are you sure you want to finish and submit?")) return;
    clearInterval(timer);
    
    let score = 0;
    examSet.forEach((q, i) => { if(answers[i] === q.c) score += 2; });

    const name = document.getElementById('stu-name').value;
    const roll = document.getElementById('stu-roll').value;
    const status = score >= 40 ? 'PASS' : 'FAIL';

    // Save Data
    let logs = JSON.parse(localStorage.getItem('examLogs')) || [];
    logs.push({n: name, r: roll, s: score, st: status});
    localStorage.setItem('examLogs', JSON.stringify(logs));

    // Result Screen
    document.getElementById('res-name').innerText = name.toUpperCase();
    document.getElementById('res-roll').innerText = roll;
    document.getElementById('res-score').innerText = score;
    const st = document.getElementById('res-status');
    st.innerText = status;
    st.style.color = score >= 40 ? 'var(--success)' : 'var(--danger)';

    document.getElementById('scr-exam').classList.add('hidden');
    document.getElementById('scr-result').classList.remove('hidden');
}

function updatePassword() {
    let p = document.getElementById('new-sys-pass').value;
    if(p) { localStorage.setItem('sysPass', p); sysPass = p; alert("Portal Password Updated!"); }
}

function clearData() {
    if(confirm("Confirm: Delete all student records?")) { localStorage.removeItem('examLogs'); renderLogs(); }
}

function renderLogs() {
    let logs = JSON.parse(localStorage.getItem('examLogs')) || [];
    document.getElementById('log-body').innerHTML = logs.map(l => `
        <tr><td>${l.n}</td><td>${l.r}</td><td>${l.s}</td><td style="color:${l.st==='PASS'?'#4ade80':'#f87171'}">${l.st}</td></tr>
    `).join('');
}
